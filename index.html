<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Historial">
<meta name="theme-color" content="#0B0F19">
<title>Historial Médico</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0F19;
    --surface: #131825;
    --surface2: #1A2035;
    --border: #243049;
    --accent: #3B82F6;
    --accent2: #06D6A0;
    --accent3: #F59E0B;
    --accent4: #EF4444;
    --text: #E8ECF4;
    --text2: #8892A8;
    --text3: #5A6580;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header {
    background: linear-gradient(135deg, #131825 0%, #1a2845 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px 0;
  }
  .header-top {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    padding-bottom: 16px;
    gap: 14px;
    flex-wrap: nowrap;
    overflow: hidden;
  }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; white-space: nowrap; flex-shrink: 0; }
  .header h1 span { color: var(--accent); }

  /* Botón Cargar Excel — pequeño, verde, junto al título */
  .btn-cargar {
    display: inline-flex; align-items: center; gap: 5px;
    background: #16a34a; color: #fff;
    border: none; border-radius: 7px;
    padding: 5px 11px; font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 600; cursor: pointer;
    white-space: nowrap; flex-shrink: 0;
    transition: background 0.2s;
  }
  .btn-cargar:hover { background: #15803d; }

  .header-info {
    display: flex; gap: 12px; align-items: center;
    font-size: 13px; color: var(--text2);
    flex: 1; justify-content: flex-end;
    min-width: 0; overflow: hidden;
  }
  .header-info .tag {
    background: var(--surface2); padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border); font-family: 'Space Mono', monospace;
    font-size: 11px; white-space: nowrap; flex-shrink: 0;
  }
  #poliza { white-space: nowrap; font-size: 12px; flex-shrink: 1; overflow: hidden; text-overflow: ellipsis; }

  .tabs { display: flex; gap: 2px; padding-bottom: 0; overflow-x: auto; }
  .tab {
    padding: 10px 20px; font-size: 13px; font-weight: 500; cursor: pointer;
    white-space: nowrap; color: var(--text3); background: transparent;
    border: none; font-family: inherit; border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .upload-zone { display: flex; justify-content: center; align-items: center; min-height: 70vh; padding: 40px; }
  .upload-card {
    background: var(--surface); border: 2px dashed var(--border); border-radius: 20px;
    padding: 60px 80px; text-align: center; cursor: pointer; transition: all 0.3s; max-width: 520px;
  }
  .upload-card:hover { border-color: var(--accent); background: var(--surface2); transform: translateY(-2px); }
  .upload-icon { font-size: 56px; margin-bottom: 20px; display: block; }
  .upload-card h2 { font-size: 20px; margin-bottom: 8px; font-weight: 500; }
  .upload-card p { color: var(--text2); font-size: 14px; line-height: 1.6; }
  input[type="file"] { display: none; }
  .main { display: none; padding: 28px 40px 60px; }
  .main.active { display: block; }
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px 24px; position: relative; overflow: hidden;
  }
  .stat-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .stat-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .stat-value { font-family: 'Space Mono', monospace; font-size: 26px; font-weight: 700; }
  .stat-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .panel { display: none; }
  .panel.active { display: block; }
  .table-container { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .table-header h3 { font-size: 16px; font-weight: 600; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: var(--surface2); padding: 11px 14px; text-align: left; font-weight: 600;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2);
    white-space: nowrap; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1;
  }
  tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
  tbody tr:nth-child(odd) { background: rgba(59,130,246,0.03); }
  tbody tr:nth-child(even) { background: transparent; }
  tbody tr:hover { background: var(--surface2); }
  .cell-short { font-size: 13px; line-height: 1.4; max-width: 220px; }
  .cell-expand { font-size: 13px; line-height: 1.4; max-width: 220px; cursor: pointer; position: relative; }
  .cell-expand:hover { color: var(--accent); }
  .cell-expand::after { content: ' ▸'; font-size: 10px; color: var(--accent); opacity: 0.6; }
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 1000; justify-content: center; align-items: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 28px 32px; max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto; position: relative;
  }
  .modal-card h4 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 12px; }
  .modal-card p { font-size: 14px; line-height: 1.8; color: var(--text); white-space: pre-wrap; }
  .modal-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: var(--text3); font-size: 22px; cursor: pointer; }
  .modal-close:hover { color: var(--text); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-blue { background: rgba(59,130,246,0.15); color: #60A5FA; }
  .badge-amber { background: rgba(245,158,11,0.15); color: #F59E0B; }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .summary-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px; cursor: pointer; transition: all 0.2s;
  }
  .summary-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .summary-card h3 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .summary-card .count { font-family: 'Space Mono', monospace; font-size: 32px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
  .summary-card .detail { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .summary-card .detail strong { color: var(--text); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .btn-citas {
    display: none;
    align-items: center; gap: 8px;
    background: linear-gradient(135deg, #DC2626 0%, #B91C1C 100%);
    color: #fff; border: none; border-radius: 10px;
    padding: 8px 18px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; position: relative; transition: all 0.25s;
    box-shadow: 0 2px 12px rgba(220,38,38,0.35);
    animation: pulse-glow 2.5s ease-in-out infinite;
    flex-shrink: 0; white-space: nowrap;
  }
  .btn-citas:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(220,38,38,0.5); }
  .btn-citas .citas-count {
    background: #fff; color: #DC2626; font-family: 'Space Mono', monospace;
    font-size: 12px; font-weight: 700; border-radius: 50%; min-width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 2px 12px rgba(220,38,38,0.35); }
    50% { box-shadow: 0 2px 20px rgba(220,38,38,0.55); }
  }
  .citas-panel { display: none; margin-bottom: 28px; }
  .citas-panel.active { display: block; }
  .cita-card {
    background: var(--surface); border: 1px solid var(--border); border-left: 4px solid #DC2626;
    border-radius: var(--radius); padding: 20px 24px; margin-bottom: 12px; transition: all 0.2s;
  }
  .cita-card:hover { border-left-color: #EF4444; background: var(--surface2); }
  .cita-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .cita-card-header h4 { font-size: 16px; font-weight: 600; color: var(--text); }
  .cita-fecha {
    font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700;
    background: rgba(220,38,38,0.15); color: #F87171; padding: 4px 12px; border-radius: 8px;
  }
  .cita-detail { font-size: 13px; color: var(--text2); line-height: 1.7; }
  .cita-detail strong { color: var(--text); }
  .citas-title-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .citas-title-row h3 { font-size: 18px; font-weight: 700; color: #F87171; }
  .citas-title-row .line { flex: 1; height: 1px; background: var(--border); }

  @media (max-width: 768px) {
    .header { padding: 12px 16px 0; }
    .header-top { gap: 10px; }
    .header h1 { font-size: 17px; }
    .main { padding: 16px 20px; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .upload-card { padding: 40px 24px; }
    .summary-grid { grid-template-columns: 1fr; }
    #poliza { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>🏥 Historial <span>Médico</span></h1>

    <label for="fileInput">
      <span class="btn-cargar">📂 Cargar Excel</span>
    </label>
    <input type="file" id="fileInput" accept=".xlsx,.xls">

    <div class="header-info">
      <button class="btn-citas" id="btnCitas" onclick="toggleCitasPanel()">
        🗓️ Citas Pendientes <span class="citas-count" id="citasCount">0</span>
      </button>
      <span id="poliza"></span>
      <span class="tag" id="lastUpdate">Sin datos</span>
    </div>
  </div>
  <div class="tabs" id="tabsBar"></div>
</div>

<div class="upload-zone" id="uploadZone">
  <label class="upload-card" for="fileInput">
    <span class="upload-icon">📋</span>
    <h2>Carga tu Historial Médico</h2>
    <p>Selecciona el archivo <strong>Historial_Medico_Lorenzo.xlsx</strong><br>para visualizar toda tu información médica.</p>
  </label>
</div>

<div class="main" id="mainContent">
  <div class="citas-panel" id="citasPanel"></div>
  <div id="panelsContainer"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-card">
    <button class="modal-close" id="modalClose">✕</button>
    <h4 id="modalTitle"></h4>
    <p id="modalBody"></p>
  </div>
</div>

<script>
const DATA = { specialties: [], analytics: [], poliza: '' };
const SKIP = ['Instrucciones', 'Analíticas'];
const WORD_LIMIT = 10;
const CELL_STORE = [];

const DB_NAME = 'HistorialMedico', DB_STORE = 'excel', DB_KEY = 'ultimo';

function abrirDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    req.onsuccess = e => res(e.target.result);
    req.onerror = () => rej();
  });
}
function guardarExcel(buffer) {
  abrirDB().then(db => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(buffer, DB_KEY);
  }).catch(() => {});
}
function cargarExcelGuardado() {
  abrirDB().then(db => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).get(DB_KEY);
    req.onsuccess = e => {
      if (e.target.result) {
        const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
        parseWorkbook(wb);
        renderDashboard();
        document.getElementById('lastUpdate').textContent += ' 💾';
      }
    };
  }).catch(() => {});
}

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const buffer = e.target.result;
    guardarExcel(buffer);
    const wb = XLSX.read(buffer, { type: 'array', cellDates: true });
    parseWorkbook(wb);
    renderDashboard();
  };
  reader.readAsArrayBuffer(file);
});

window.addEventListener('load', cargarExcelGuardado);

document.addEventListener('click', function(e) {
  const cell = e.target.closest('.cell-expand');
  if (cell) {
    const idx = parseInt(cell.dataset.idx);
    if (CELL_STORE[idx]) openModal(CELL_STORE[idx].col, CELL_STORE[idx].text);
  }
});
document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.getElementById('modalClose').addEventListener('click', closeModal);
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

function openModal(title, text) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').textContent = text;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function parseWorkbook(wb) {
  DATA.specialties = []; DATA.analytics = []; DATA.poliza = '';
  CELL_STORE.length = 0;
  wb.SheetNames.forEach(name => {
    const ws = wb.Sheets[name];
    const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    if (json.length < 2) return;
    const row1 = String(json[0][0] || '');
    const pm = row1.match(/Póliza:\s*([\d]+)/i);
    if (pm && !DATA.poliza) DATA.poliza = pm[1];
    if (name === 'Analíticas') {
      if (json.length > 2) {
        const h = json[1];
        for (let i = 2; i < json.length; i++) {
          if (!json[i][0]) continue;
          const a = {}; h.forEach((k, idx) => { a[k] = json[i][idx] || ''; });
          DATA.analytics.push(a);
        }
      }
    } else if (!SKIP.includes(name)) {
      const h = json[1]; const recs = [];
      for (let i = 2; i < json.length; i++) {
        if (!json[i][0]) continue;
        const r = {}; h.forEach((k, idx) => { r[k] = json[i][idx] || ''; });
        recs.push(r);
      }
      if (recs.length > 0) DATA.specialties.push({ name, records: recs });
    }
  });
}

function fmt(v) {
  if (!v) return '';
  if (v instanceof Date) return v.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
  return String(v);
}

function cellHTML(text, colName) {
  const clean = fmt(text).replace(/\n/g, ' ').trim();
  if (!clean) return '<span class="cell-short">—</span>';
  const words = clean.split(/\s+/);
  if (words.length <= WORD_LIMIT) return '<span class="cell-short">' + escapeHTML(clean) + '</span>';
  const idx = CELL_STORE.length;
  CELL_STORE.push({ col: colName, text: fmt(text).replace(/\n/g, '\n').trim() });
  const short = escapeHTML(words.slice(0, WORD_LIMIT).join(' ')) + '…';
  return '<span class="cell-expand" data-idx="' + idx + '">' + short + '</span>';
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderDashboard() {
  document.getElementById('uploadZone').style.display = 'none';
  document.getElementById('mainContent').classList.add('active');
  document.getElementById('lastUpdate').textContent = new Date().toLocaleDateString('es-ES');
  if (DATA.poliza) document.getElementById('poliza').textContent = 'Póliza: ' + DATA.poliza;

  let tabsHTML = '<button class="tab active" data-target="resumen">📊 Resumen</button>';
  DATA.specialties.forEach(s => {
    tabsHTML += '<button class="tab" data-target="spec_' + s.name.replace(/\s/g, '_') + '">🏷️ ' + s.name + '</button>';
  });
  tabsHTML += '<button class="tab" data-target="analiticas">🔬 Analíticas</button>';
  document.getElementById('tabsBar').innerHTML = tabsHTML;

  let H = '';
  const totalRecs = DATA.specialties.reduce((s, sp) => s + sp.records.length, 0);

  H += '<div class="panel active" id="panel_resumen">';
  H += '<div class="stats-row">';
  H += '<div class="stat-card"><div class="stat-bar" style="background:var(--accent)"></div><div class="stat-label">Total consultas</div><div class="stat-value">' + totalRecs + '</div><div class="stat-sub">Todos los especialistas</div></div>';
  H += '<div class="stat-card"><div class="stat-bar" style="background:var(--accent2)"></div><div class="stat-label">Especialidades</div><div class="stat-value">' + DATA.specialties.length + '</div><div class="stat-sub">' + (DATA.specialties.map(s => s.name).join(', ') || 'Ninguna') + '</div></div>';
  H += '<div class="stat-card"><div class="stat-bar" style="background:var(--accent3)"></div><div class="stat-label">Analíticas</div><div class="stat-value">' + DATA.analytics.length + '</div><div class="stat-sub">' + (DATA.analytics.length > 0 ? 'valores registrados' : 'Sin registros aún') + '</div></div>';
  H += '</div>';

  H += '<div class="summary-grid">';
  DATA.specialties.forEach(s => {
    const last = s.records[s.records.length - 1];
    const doctors = [...new Set(s.records.map(r => fmt(r['Médico'])).filter(Boolean))];
    const diags = [...new Set(s.records.map(r => fmt(r['Diagnóstico']).replace(/\n/g, ', ')).filter(Boolean))];
    H += '<div class="summary-card" data-spectab="spec_' + s.name.replace(/\s/g, '_') + '">';
    H += '<h3>' + escapeHTML(s.name) + '</h3>';
    H += '<div class="count">' + s.records.length + '</div>';
    H += '<div class="detail"><strong>Última visita:</strong> ' + fmt(last['Fecha']) + '<br>';
    H += '<strong>Médico' + (doctors.length > 1 ? 's' : '') + ':</strong> ' + escapeHTML(doctors.join(', ')) + '<br>';
    H += '<strong>Diagnóstico' + (diags.length > 1 ? 's' : '') + ':</strong> ' + escapeHTML(diags.join(' | ')) + '</div></div>';
  });
  H += '</div></div>';

  DATA.specialties.forEach(s => {
    const id = 'spec_' + s.name.replace(/\s/g, '_');
    const hdrs = Object.keys(s.records[0]);
    H += '<div class="panel" id="panel_' + id + '"><div class="table-container">';
    H += '<div class="table-header"><h3>' + escapeHTML(s.name) + '</h3><span class="badge badge-blue">' + s.records.length + ' registro' + (s.records.length !== 1 ? 's' : '') + '</span></div>';
    H += '<div class="table-scroll"><table><thead><tr>';
    hdrs.forEach(h => { H += '<th>' + escapeHTML(h) + '</th>'; });
    H += '</tr></thead><tbody>';
    s.records.forEach(r => {
      H += '<tr>';
      hdrs.forEach(h => { H += '<td>' + cellHTML(r[h], h) + '</td>'; });
      H += '</tr>';
    });
    H += '</tbody></table></div></div></div>';
  });

  H += '<div class="panel" id="panel_analiticas">';
  if (DATA.analytics.length > 0) {
    const ah = Object.keys(DATA.analytics[0]);
    H += '<div class="table-container"><div class="table-header"><h3>Analíticas y valores</h3>';
    H += '<span class="badge badge-amber">' + DATA.analytics.length + ' registros</span></div>';
    H += '<div class="table-scroll"><table><thead><tr>';
    ah.forEach(h => { H += '<th>' + escapeHTML(h) + '</th>'; });
    H += '</tr></thead><tbody>';
    DATA.analytics.forEach(a => {
      H += '<tr>';
      ah.forEach(h => { H += '<td>' + cellHTML(a[h], h) + '</td>'; });
      H += '</tr>';
    });
    H += '</tbody></table></div></div>';
  } else {
    H += '<div class="empty-state"><div class="icon">📊</div><p>No hay analíticas registradas aún.<br>Cuando subas informes con valores analíticos, aquí verás su evolución.</p></div>';
  }
  H += '</div>';

  document.getElementById('panelsContainer').innerHTML = H;

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', function() { activateTab(this.dataset.target); });
  });
  document.querySelectorAll('.summary-card[data-spectab]').forEach(card => {
    card.addEventListener('click', function() { activateTab(this.dataset.spectab); });
  });

  renderCitasPendientes();
}

function activateTab(target) {
  document.querySelectorAll('.tab').forEach(t => { t.classList.toggle('active', t.dataset.target === target); });
  document.querySelectorAll('.panel').forEach(p => { p.classList.toggle('active', p.id === 'panel_' + target); });
  document.getElementById('citasPanel').classList.remove('active');
}

function toggleCitasPanel() {
  const panel = document.getElementById('citasPanel');
  panel.classList.toggle('active');
}

function parseCitaDate(str) {
  if (str instanceof Date) return str;
  const s = String(str).trim();
  const m1 = s.match(/^(\d{1,2})-(\d{1,2})-(\d{2})\s+(\d{1,2}):(\d{2})/);
  if (m1) return new Date(2000 + parseInt(m1[3]), parseInt(m1[2]) - 1, parseInt(m1[1]), parseInt(m1[4]), parseInt(m1[5]));
  const m1b = s.match(/^(\d{1,2})-(\d{1,2})-(\d{2})/);
  if (m1b) return new Date(2000 + parseInt(m1b[3]), parseInt(m1b[2]) - 1, parseInt(m1b[1]));
  const m2 = s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m2) return new Date(parseInt(m2[3]), parseInt(m2[2]) - 1, parseInt(m2[1]));
  const m3 = s.match(/(\d{1,2})\/(\d{1,2})\/(\d{2})/);
  if (m3) return new Date(2000 + parseInt(m3[3]), parseInt(m3[2]) - 1, parseInt(m3[1]));
  return null;
}

function renderCitasPendientes() {
  const citas = [];
  const now = new Date(); now.setHours(0,0,0,0);
  DATA.specialties.forEach(s => {
    s.records.forEach(r => {
      const proxCita = fmt(r['Próxima Cita']);
      if (!proxCita || proxCita === '—') return;
      const citaDate = parseCitaDate(proxCita);
      if (citaDate && citaDate < now) return;
      citas.push({
        especialidad: s.name, fecha: proxCita, dateObj: citaDate,
        medico: fmt(r['Médico']), centro: fmt(r['Centro']),
        motivo: fmt(r['Motivo Consulta']), tipo: fmt(r['Tipo Exploración']),
        observaciones: fmt(r['Observaciones'])
      });
    });
  });
  citas.sort((a, b) => {
    if (a.dateObj && b.dateObj) return a.dateObj - b.dateObj;
    if (a.dateObj) return -1; if (b.dateObj) return 1; return 0;
  });
  const btn = document.getElementById('btnCitas');
  const countEl = document.getElementById('citasCount');
  if (citas.length > 0) { btn.style.display = 'flex'; countEl.textContent = citas.length; }
  else { btn.style.display = 'none'; }
  let H = '<div class="citas-title-row"><h3>🗓️ Citas Pendientes</h3><div class="line"></div></div>';
  citas.forEach(c => {
    H += '<div class="cita-card"><div class="cita-card-header">';
    H += '<h4>' + escapeHTML(c.especialidad) + '</h4>';
    H += '<span class="cita-fecha">' + escapeHTML(c.fecha) + '</span></div>';
    H += '<div class="cita-detail">';
    if (c.tipo) H += '<strong>Exploración:</strong> ' + escapeHTML(c.tipo) + '<br>';
    if (c.centro) H += '<strong>Centro:</strong> ' + escapeHTML(c.centro) + '<br>';
    if (c.medico) H += '<strong>Médico:</strong> ' + escapeHTML(c.medico) + '<br>';
    if (c.motivo) H += '<strong>Motivo:</strong> ' + escapeHTML(c.motivo) + '<br>';
    if (c.observaciones) H += '<strong>Observaciones:</strong> ' + escapeHTML(c.observaciones);
    H += '</div></div>';
  });
  document.getElementById('citasPanel').innerHTML = H;
}
</script>
